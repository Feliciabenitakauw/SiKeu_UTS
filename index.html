<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SiKeu Sekolah</title>
    <!-- Menggunakan font Inter dari Google Fonts untuk tampilan modern -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-card-body">

                <!-- Logo -->
                <div class="logo-wrapper">
                    <div class="logo-outer">
                        <div class="logo-inner">
                            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor"
                                viewBox="0 0 256 256">
                                <path
                                    d="M240,208H224V104a8,8,0,0,0-8-8H40a8,8,0,0,0-8,8V208H16a8,8,0,0,0,0,16H240a8,8,0,0,0,0-16Zm-32,0H168V112h40ZM104,112h48v96H104ZM48,112H88v96H48ZM236.42,72.6l-104-56a8,8,0,0,0-7.55,0l-105,56.55A8,8,0,0,0,24,88H232a8,8,0,0,0,4.42-15.4ZM128,34.42,207.25,72H48.06Z">
                                </path>
                            </svg>
                        </div>
                    </div>
                </div>

                <!-- Judul & Subjudul -->
                <h1 class="login-title">SiKeu Sekolah</h1>
                <p class="login-subtitle">Silakan masuk ke akun pengelola keuangan Anda</p>

                <!-- Form Login -->
                <form id="form-login">
                    <div class="form-group">
                        <label for="username">NIP / Username</label>
                        <div class="input-wrapper">
                            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256"
                                fill="currentColor">
                                <path
                                    d="M230.92,212c-15.23-26.33-38.7-45.21-66.09-54.16a72,72,0,1,0-73.66,0C63.78,166.78,40.31,185.66,25.08,212a8,8,0,1,0,13.85,8c18.84-32.56,52.14-52,89.07-52s70.23,19.44,89.07,52a8,8,0,1,0,13.85-8ZM72,96a56,56,0,1,1,56,56A56.06,56.06,0,0,1,72,96Z">
                                </path>
                            </svg>
                            <input type="text" id="username" placeholder="Masukkan NIP atau Username" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <div class="label-row">
                            <label for="password">Password</label>
                            <a href="#" class="forgot-password">Lupa Password?</a>
                        </div>
                        <div class="input-wrapper">
                            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256"
                                fill="currentColor">
                                <path
                                    d="M208,88H176V56a48,48,0,0,0-96,0V88H48a16,16,0,0,0-16,16V208a16,16,0,0,0,16,16H208a16,16,0,0,0,16-16V104A16,16,0,0,0,208,88ZM96,56a32,32,0,0,1,64,0V88H96Zm112,152H48V104H208V208Zm-80-68v24a8,8,0,0,1-16,0V140a8,8,0,0,1,16,0Z">
                                </path>
                            </svg>
                            <input type="password" id="password" placeholder="Masukkan password Anda" required>
                        </div>
                    </div>

                    <button type="submit" class="btn-submit">
                        Masuk
                        <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256"
                            fill="currentColor">
                            <path
                                d="M136,128a8,8,0,0,1-8,8H32a8,8,0,0,1,0-16h96A8,8,0,0,1,136,128Zm64-88H104A16,16,0,0,0,88,56V96a8,8,0,0,0,16,0V56h96V200H104V160a8,8,0,0,0-16,0v40a16,16,0,0,0,16,16h96a16,16,0,0,0,16-16V56A16,16,0,0,0,200,40Zm-21.66,82.34-40-40a8,8,0,0,0-11.32,11.32L152.69,120H32a8,8,0,0,0,0,16H152.69l-25.67,25.66a8,8,0,0,0,11.32,11.32l40-40A8,8,0,0,0,178.34,122.34Z">
                            </path>
                        </svg>
                    </button>
                </form>
            </div>

            <!-- Footer Card -->
            <div class="login-card-footer">
                <div class="footer-logo-circle"></div>
                <span>Portal Administrasi Terpusat</span>
            </div>
        </div>

        <!-- Teks Informasi Sistem Bawah -->
        <div class="system-info">
            <h2 class="school-name">SDN 01 Kota Pintar</h2>
            <p class="system-desc">SISTEM KEUANGAN SEKOLAH</p>
            <p class="copyright">&copy; 2024 Dinas Pendidikan Kota Pintar. Semua Hak Dilindungi.</p>
        </div>
    </div>

    <!-- Tombol Bantuan Mengambang -->
    <button class="help-btn" aria-label="Bantuan">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="currentColor">
            <path
                d="M128,24A104,104,0,1,0,232,128,104.11,104.11,0,0,0,128,24Zm0,192a88,88,0,1,1,88-88A88.1,88.1,0,0,1,128,216Zm16-40a8,8,0,0,1-8,8,16,16,0,1,1,16-16A8,8,0,0,1,144,176ZM112.55,93.61a32,32,0,1,1,61.73,12.7c-4.48,11.66-15.69,20-19.35,22.64A6.8,6.8,0,0,0,152,133.72a8,8,0,0,1-16,0,22.75,22.75,0,0,1,9.81-18.43c4.27-3.1,12.43-9.52,9.08-18.23a16,16,0,1,0-23.77-16.14,8,8,0,0,1-15.93-1.63C115.53,95,114.86,94.27,112.55,93.61Z">
            </path>
        </svg>
    </button>

    <script src="script.js"></script>
</body>

</html>
